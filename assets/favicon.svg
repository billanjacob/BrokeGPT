<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="fgGrad" cx="30%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#060e1e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#fgGrad)"/>

  <!-- Subtle blue bloom -->
  <circle cx="6" cy="6" r="14" fill="#2563EB" opacity="0.09"/>

  <!-- B — white -->
  <text x="10" y="16"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="800"
        text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff">B</text>

  <!-- ₹ — gold, smaller -->
  <text x="22" y="16"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="800"
        text-anchor="middle" dominant-baseline="middle"
        fill="#fbbf24">₹</text>

  <!-- Gold accent bar -->
  <rect x="5" y="24" width="22" height="1.5" rx="0.75" fill="#d97706" opacity="0.8"/>
</svg>
