<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fgBg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c1a3d"/>
    </linearGradient>
    <linearGradient id="fgBrain" x1="4" y1="4" x2="16" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="fgDollar" x1="16" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <clipPath id="fgLeft">
      <path d="M16,4 A12,12 0 0,0 16,28 Z"/>
    </clipPath>
    <clipPath id="fgRight">
      <path d="M16,4 A12,12 0 0,1 16,28 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#fgBg)"/>

  <!-- Brain half -->
  <circle cx="16" cy="16" r="12" fill="url(#fgBrain)" clip-path="url(#fgLeft)"/>
  <g clip-path="url(#fgLeft)" stroke="#86198f" stroke-width="0.9" stroke-linecap="round">
    <path d="M6.5,9.5 C4,13.5 4,18.5 6.5,22"/>
    <path d="M9.5,11 C7.2,15 7.5,19.5 10,22.5"/>
    <path d="M5.5,16 C8,15.7 11.5,15.2 15,16.5"/>
  </g>

  <!-- Dollar half -->
  <circle cx="16" cy="16" r="12" fill="url(#fgDollar)" clip-path="url(#fgRight)"/>
  <text x="22" y="16"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="14" font-weight="900"
        fill="#431407" opacity="0.88"
        text-anchor="middle" dominant-baseline="middle"
        clip-path="url(#fgRight)">$</text>

  <!-- Divider + border -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="white" stroke-width="0.8" opacity="0.85"/>
  <circle cx="16" cy="16" r="12" stroke="white" stroke-width="0.6" opacity="0.55"/>
</svg>
