<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fgBg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="fgCoin" x1="8" y1="8" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#fgBg)"/>

  <!-- Coin -->
  <circle cx="16" cy="16" r="9" fill="url(#fgCoin)"/>

  <!-- Rupee symbol -->
  <text
    x="16" y="16"
    font-family="Arial, sans-serif"
    font-size="9"
    font-weight="900"
    fill="#78350F"
    text-anchor="middle"
    dominant-baseline="middle"
  >₹</text>

  <!-- Crack -->
  <path
    d="M 13 9 L 15 13 L 13 15 L 16 20 L 14.5 23"
    stroke="#EF4444"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
