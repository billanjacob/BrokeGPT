<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fgBg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c1a3d"/>
    </linearGradient>
    <linearGradient id="fgWallet" x1="0" y1="7" x2="0" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" ry="8" fill="url(#fgBg)"/>

  <!-- Card peeking out top -->
  <rect x="10" y="5.5" width="12" height="4" rx="1" fill="#fbbf24" stroke="#d97706" stroke-width="0.5"/>

  <!-- Wallet body -->
  <rect x="3" y="8" width="26" height="17" rx="3.5" fill="url(#fgWallet)" stroke="#92400e" stroke-width="0.8"/>

  <!-- Fold line -->
  <line x1="6.5" y1="15" x2="25.5" y2="15" stroke="#6b2d08" stroke-width="0.7" opacity="0.8"/>

  <!-- Left eye -->
  <circle cx="11" cy="18.5" r="1.8" fill="#fef9c3"/>
  <circle cx="11" cy="18.5" r="0.8" fill="#431407"/>

  <!-- Right eye -->
  <circle cx="21" cy="18.5" r="1.8" fill="#fef9c3"/>
  <circle cx="21" cy="18.5" r="0.8" fill="#431407"/>

  <!-- Frown -->
  <path d="M12,22.5 Q16,19.5 20,22.5"
        stroke="#fef9c3" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Teardrop -->
  <path d="M11,20.5 Q9.5,22.5 11,24 Q12.5,22.5 11,20.5Z" fill="#93c5fd"/>
</svg>
