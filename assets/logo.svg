<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#060e1e"/>
    </radialGradient>
    <filter id="bgShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1D4ED8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" ry="26" fill="url(#bgGrad)" filter="url(#bgShadow)"/>

  <!-- Subtle top-left blue bloom -->
  <circle cx="22" cy="22" r="52" fill="#2563EB" opacity="0.09"/>

  <!-- B — white, large -->
  <text x="28" y="60"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800"
        text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff">B</text>

  <!-- ₹ — gold, smaller, nestled between B and G -->
  <text x="60" y="60"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="800"
        text-anchor="middle" dominant-baseline="middle"
        fill="#fbbf24">₹</text>

  <!-- G — brand blue, large -->
  <text x="92" y="60"
        font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800"
        text-anchor="middle" dominant-baseline="middle"
        fill="#60a5fa">G</text>

  <!-- Gold accent bar -->
  <rect x="32" y="88" width="56" height="3" rx="1.5" fill="#d97706" opacity="0.8"/>
</svg>
