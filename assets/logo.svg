<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="30" y1="32" x2="90" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1D4ED8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="28" ry="28" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Coin body -->
  <circle cx="60" cy="62" r="30" fill="url(#coinGrad)" opacity="0.95"/>

  <!-- Coin inner ring -->
  <circle cx="60" cy="62" r="24" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0.6"/>

  <!-- Rupee symbol on coin -->
  <text
    x="60" y="70"
    font-family="Inter, Arial, sans-serif"
    font-size="24"
    font-weight="800"
    fill="#78350F"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.9"
  >₹</text>

  <!-- Crack line across coin (broken/broke) -->
  <path
    d="M 52 36 L 58 50 L 53 55 L 60 70 L 56 84"
    stroke="#EF4444"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Small sparkle top-right -->
  <circle cx="88" cy="28" r="4" fill="#60A5FA" opacity="0.8"/>
  <circle cx="96" cy="22" r="2.5" fill="#93C5FD" opacity="0.6"/>
  <circle cx="92" cy="36" r="2" fill="#BFDBFE" opacity="0.5"/>

  <!-- "BG" monogram bottom-right badge -->
  <circle cx="88" cy="90" r="15" fill="#0F172A" opacity="0.85"/>
  <text
    x="88" y="90"
    font-family="Inter, Arial, sans-serif"
    font-size="10"
    font-weight="800"
    fill="#F1F5F9"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="0.5"
  >BG</text>
</svg>
