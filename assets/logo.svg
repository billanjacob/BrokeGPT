<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0c1a3d"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0" y1="28" x2="0" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1D4ED8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="28" ry="28" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Credit card peeking out the top -->
  <rect x="37" y="23" width="34" height="10" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <!-- Card stripe -->
  <rect x="37" y="27" width="34" height="3" fill="#d97706" opacity="0.5"/>

  <!-- Wallet body (covers bottom of card) -->
  <rect x="14" y="30" width="92" height="64" rx="12" fill="url(#walletGrad)" stroke="#92400e" stroke-width="1.5"/>

  <!-- Inner stitching detail -->
  <rect x="18.5" y="34.5" width="83" height="55" rx="9"
        stroke="#d97706" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- Fold / card-divider line -->
  <line x1="26" y1="52" x2="94" y2="52" stroke="#6b2d08" stroke-width="1.2" opacity="0.8"/>

  <!-- Left eye -->
  <circle cx="44" cy="63" r="5.5" fill="#fef9c3"/>
  <circle cx="44" cy="63" r="2.5" fill="#431407"/>
  <circle cx="45.5" cy="61.5" r="1" fill="white"/>

  <!-- Right eye -->
  <circle cx="76" cy="63" r="5.5" fill="#fef9c3"/>
  <circle cx="76" cy="63" r="2.5" fill="#431407"/>
  <circle cx="77.5" cy="61.5" r="1" fill="white"/>

  <!-- Sad frown (arc bows upward = downturned corners) -->
  <path d="M46,81 Q60,71 74,81"
        stroke="#fef9c3" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Teardrop falling from left eye -->
  <path d="M44,70 Q39,76 44,81 Q49,76 44,70Z" fill="#93c5fd"/>
</svg>
